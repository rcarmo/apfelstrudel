<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apfelstrudel - Live Coding with AI</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥧</text></svg>">
  <link rel="stylesheet" href="/styles.css">
  <!-- Polyfill AudioWorklet for browsers/contexts that lack it (e.g. non-secure origins) -->
  <script>
    if (typeof AudioWorkletNode === 'undefined') {
      window.AudioWorkletNode = class AudioWorkletNode {
        constructor() { throw new Error('AudioWorklet not supported in this context'); }
        static get length() { return 0; }
      };
    }
    // Stub audioWorklet on AudioContext if missing (Safari HTTP, older WebKit)
    if (typeof AudioContext !== 'undefined' && !AudioContext.prototype.audioWorklet) {
      Object.defineProperty(AudioContext.prototype, 'audioWorklet', {
        get() { return { addModule() { return Promise.resolve(); } }; }
      });
    }
    if (typeof webkitAudioContext !== 'undefined' && !webkitAudioContext.prototype.audioWorklet) {
      Object.defineProperty(webkitAudioContext.prototype, 'audioWorklet', {
        get() { return { addModule() { return Promise.resolve(); } }; }
      });
    }
  </script>
  <link rel="stylesheet" href="/vendor/fonts/fonts.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1>🥧 Apfelstrudel</h1>
      <div class="header-controls">
        <button id="btn-play" class="btn btn-play" title="Play (Ctrl+Enter)">▶ Play</button>
        <button id="btn-stop" class="btn btn-stop" title="Stop (Ctrl+.)">◼ Stop</button>
        <div class="tempo-control">
          <label for="tempo">BPM:</label>
          <input type="number" id="tempo" value="60" min="20" max="300" step="1">
        </div>
      </div>
    </header>

    <!-- Main content split pane -->
    <main class="main">
      <!-- Left: Strudel editor -->
      <section class="editor-pane">
        <div class="pane-header">
          <span>Pattern Editor</span>
          <div class="header-tools">
            <button id="btn-undo" class="btn-icon" title="Undo (Ctrl+Z)">↩️</button>
            <button id="btn-redo" class="btn-icon" title="Redo (Ctrl+Y)">↪️</button>
            <span class="status" id="status-indicator">Ready</span>
          </div>
        </div>
        <div id="tabs-container" class="tabs-container">
          <!-- Tabs injected by JS -->
        </div>
        <div id="strudel-container">
          <div id="code-editor"></div>
        </div>
        <div id="visualization"></div>
      </section>

      <!-- Hidden file input for "Read from file" -->
      <input type="file" id="file-input" style="display: none" accept=".js,.strudel,.txt">

      <!-- Resize handle -->
      <div class="resize-handle" id="resize-handle"></div>

      <!-- Right: Chat sidebar -->
      <aside class="chat-pane">
        <div class="pane-header">
          <span>AI Assistant</span>
        </div>
        <div id="chat-messages" class="chat-messages">
          <div class="message assistant">
            <div class="message-content">
              <p>Hi! I'm your Strudel assistant. I can help you:</p>
              <ul>
                <li>Write and modify music patterns</li>
                <li>Explain Strudel's mini-notation</li>
                <li>Control playback and tempo</li>
                <li>Explore sounds and samples</li>
              </ul>
              <p>Just type what you want to create!</p>
            </div>
          </div>
        </div>
        <form id="chat-form" class="chat-input">
          <textarea id="chat-input" placeholder="Ask about patterns, sounds, or say what music you want..." rows="2"></textarea>
          <button type="submit" class="btn btn-send" title="Send (Enter)">Send</button>
        </form>
      </aside>
    </main>
  </div>

  <!-- Import map for vendored dependencies -->
  <script type="importmap">
  {
    "imports": {
      "@strudel/web": "/vendor/strudel/web.mjs",
      "@strudel/mini": "/vendor/strudel/mini.mjs",
      "@strudel/webaudio": "/vendor/strudel/webaudio.mjs",
      "@strudel/core": "/vendor/strudel/core.mjs",
      "@strudel/draw": "/vendor/strudel/draw.mjs",
      "@strudel/codemirror": "/vendor/strudel/codemirror.mjs",
      "superdough": "/vendor/strudel/superdough.mjs",
      "supradough": "/vendor/strudel/supradough.mjs",
      "preact": "/vendor/preact/preact.mjs",
      "preact/hooks": "/vendor/preact/hooks.mjs",
      "htm": "/vendor/htm/htm.mjs"
    }
  }
  </script>
  <script type="module" src="/app.js"></script>
</body>
</html>
